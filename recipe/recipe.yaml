schema_version: 1

context:
  name: mkdocs-material
  version: "9.7.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mkdocs_material-${{ version }}.tar.gz
  sha256: e5f0a18319699da7e78c35e4a8df7e93537a888660f61a86bd773a7134798f22

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling
    - hatch-requirements-txt
    - hatch-nodejs-version >=0.3.0
    - trove-classifiers >=2023.10.18
  run:
    - python >=${{ python_min }}
    - jinja2 >=3.1
    - markdown >=3.2
    - mkdocs >=1.6
    - mkdocs-material-extensions >=1.3
    - pygments >=2.16
    - pymdown-extensions >=10.2
    - babel >=2.10
    - colorama >=0.4
    - paginate >=0.5
    - backrefs >=5.7.post1
    - requests >=2.30

tests:
  - python:
      imports:
        - material
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: MIT
  license_file: LICENSE
  summary: A Material Design theme for mkdocs
  homepage: https://squidfunk.github.io/mkdocs-material/
  repository: https://squidfunk.github.io/mkdocs-material/customization/
  documentation: https://squidfunk.github.io/mkdocs-material/

extra:
  recipe-maintainers:
    - ruben-arts
    - monaldoj
    - marcelotrevisani
    - thewchan
